name: Regenerate pnpm-lock.yaml

on:
  workflow_dispatch:
  push:
    paths:
      - 'package.json'
      - '!pnpm-lock.yaml'

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      
      - name: Check if lockfile exists
        id: check-lockfile
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Install dependencies (generates lockfile)
        if: steps.check-lockfile.outputs.exists == 'false'
        run: pnpm install --no-frozen-lockfile
      
      - name: Verify lockfile was created
        if: steps.check-lockfile.outputs.exists == 'false'
        run: |
          if [ ! -f "pnpm-lock.yaml" ]; then
            echo "Error: pnpm-lock.yaml was not generated"
            exit 1
          fi
          echo "✅ pnpm-lock.yaml successfully generated"
      
      - name: Commit and push lockfile
        if: steps.check-lockfile.outputs.exists == 'false'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pnpm-lock.yaml
          git commit -m "chore: regenerate pnpm-lock.yaml with all dependencies

          Auto-generated lockfile including:
          - react-pageflip@^2.0.3
          - react-use-sound@^2.0.1
          
          [skip ci]"
          git push
