name: Bug report
description: Something on the site isn't working as expected
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /resources
        2. Click the region filter
        3. ...
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: Browser and OS
      placeholder: Chrome 125 on macOS 14, Safari on iOS 17, etc.
    validations:
      required: false
